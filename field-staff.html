<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คำขอจองสนาม — เจ้าหน้าที่</title>
<style>
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,"Segoe UI",Roboto,Tahoma,sans-serif; background:#F3F1F7; color:#26215C; }
  .wrap { max-width:460px; margin:0 auto; min-height:100vh; background:#fff; }
  .head { background:#3C3489; padding:16px 20px; color:#fff; }
  .head h1 { margin:0; font-size:17px; font-weight:600; }
  .head p { margin:2px 0 0; font-size:12px; color:#CECBF6; }
  .body { padding:16px 18px 30px; }
  label { display:block; font-size:12px; color:#5F5E5A; margin:0 0 4px; }
  select,input { width:100%; font-size:14px; padding:9px 11px; border:1px solid #D3D1C7; border-radius:8px; background:#fff; color:#26215C; font-family:inherit; }
  select:focus,input:focus { outline:none; border-color:#534AB7; }
  .btn { width:100%; background:#534AB7; color:#fff; border:none; border-radius:8px; padding:11px; font-size:15px; font-weight:600; cursor:pointer; }
  .btn:active { transform:scale(.99); }
  .btn.sm { padding:10px; font-size:14px; }
  .filter { display:flex; align-items:center; gap:10px; margin:0 0 14px; }
  .filter span { font-size:13px; color:#5F5E5A; white-space:nowrap; }
  .card { border:1px solid #D3D1C7; border-radius:12px; padding:13px 15px; margin:0 0 12px; }
  .ctop { display:flex; align-items:center; justify-content:space-between; margin:0 0 8px; }
  .bkid { font-size:13px; font-weight:600; }
  .badge { font-size:12px; font-weight:600; padding:3px 10px; border-radius:20px; }
  .b-wait { background:#FAEEDA; color:#854F0B; }
  .b-ok { background:#E1F5EE; color:#0F6E56; }
  .b-cancel { background:#FCEBEB; color:#A32D2D; }
  .line { margin:0 0 3px; font-size:13px; color:#5F5E5A; }
  .line b { color:#26215C; font-weight:600; }
  .money { font-size:13px; color:#444441; margin:6px 0 3px; }
  .phone { color:#185FA5; }
  .edit { border-top:1px solid #E7E5DE; padding-top:11px; margin-top:9px; }
  .edit label { margin-top:0; }
  .edit select,.edit input { margin:0 0 9px; }
  .done { border-top:1px solid #E7E5DE; padding-top:9px; margin-top:6px; font-size:12px; color:#888780; }
  .empty { text-align:center; color:#888780; font-size:14px; padding:30px 0; }
  #login { padding:40px 20px; }
  #login p { font-size:14px; color:#5F5E5A; margin:0 0 14px; }
  .err { color:#A32D2D; font-size:13px; margin:8px 0 0; min-height:16px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head"><h1>คำขอจองสนามฟุตบอล</h1><p>สำหรับเจ้าหน้าที่ Phitsanulok United</p></div>

  <div id="login" class="body">
    <p>กรอกรหัสผ่านเพื่อเข้าใช้งาน</p>
    <input type="password" id="pw" placeholder="รหัสผ่าน">
    <div class="err" id="loginErr"></div>
    <div style="margin-top:12px"><button class="btn" id="loginBtn">เข้าสู่ระบบ</button></div>
  </div>

  <div id="panel" class="body" style="display:none">
    <div class="filter">
      <span>แสดง</span>
      <select id="statusFilter">
        <option value="รอยืนยัน">รอยืนยัน</option>
        <option value="ยืนยันแล้ว">ยืนยันแล้ว</option>
        <option value="ยกเลิก">ยกเลิก</option>
        <option value="ทั้งหมด">ทั้งหมด</option>
      </select>
    </div>
    <div id="list"><div class="empty">กำลังโหลด...</div></div>
  </div>
</div>

<script>
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxlDpvWL9LrGlzup_6DsvDvVB_954NMT2Z-u8nTfI3y7KoiA18JjkORGgy31lX9sAR2/exec';
var STAFF_PW='';

function jsonp(url, params, cb){
  var name='cb_'+Date.now()+Math.floor(Math.random()*1000);
  var qs=Object.keys(params).map(function(k){ return encodeURIComponent(k)+'='+encodeURIComponent(params[k]); }).join('&');
  window[name]=function(res){ cb(res); delete window[name]; document.body.removeChild(s); };
  var s=document.createElement('script'); s.src=url+'?'+qs+'&callback='+name;
  s.onerror=function(){ cb({ok:false,error:'เชื่อมต่อไม่สำเร็จ'}); };
  document.body.appendChild(s);
}

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('pw').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
function doLogin(){
  var pw=document.getElementById('pw').value;
  document.getElementById('loginErr').textContent='กำลังตรวจสอบ...';
  jsonp(GAS_URL, { action:'login', pw:pw }, function(res){
    if (res && res.ok){ STAFF_PW=pw; document.getElementById('login').style.display='none'; document.getElementById('panel').style.display='block'; loadList(); }
    else { document.getElementById('loginErr').textContent='รหัสผ่านไม่ถูกต้อง'; }
  });
}
document.getElementById('statusFilter').addEventListener('change', loadList);

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
function badgeClass(st){ if(st==='ยืนยันแล้ว') return 'b-ok'; if(st==='ยกเลิก') return 'b-cancel'; return 'b-wait'; }

function loadList(){
  var status=document.getElementById('statusFilter').value;
  document.getElementById('list').innerHTML='<div class="empty">กำลังโหลด...</div>';
  jsonp(GAS_URL, { action:'list', status:status }, function(res){
    if (!res || !res.ok){ document.getElementById('list').innerHTML='<div class="empty">โหลดข้อมูลไม่สำเร็จ</div>'; return; }
    render(res.rows);
  });
}

function render(rows){
  var box=document.getElementById('list');
  if (!rows.length){ box.innerHTML='<div class="empty">ไม่มีรายการ</div>'; return; }
  box.innerHTML='';
  rows.forEach(function(r){
    var isCancelled=(r.status==='ยกเลิก');   // ยกเลิกแล้ว = จบจริง ล็อกไม่ให้แก้
    var isConfirmed=(r.status==='ยืนยันแล้ว'); // ยืนยันแล้ว = ยังแก้/ยกเลิกต่อได้
    var card=document.createElement('div'); card.className='card';
    var html=
      '<div class="ctop"><span class="bkid">'+esc(r.bookingId)+'</span><span class="badge '+badgeClass(r.status)+'">'+esc(r.status)+'</span></div>'+
      '<p class="line"><b>'+esc(r.field)+'</b></p>'+
      '<p class="line">'+esc(r.date)+' · '+esc(r.start)+'-'+esc(r.end)+' ('+esc(r.hours)+' ชม.)</p>'+
      '<p class="money">ค่าเช่า '+esc(r.rent)+' · มัดจำ '+esc(r.deposit)+' · คงเหลือ '+esc(r.remaining)+' บาท</p>'+
      '<p class="line">'+esc(r.guestName)+(r.teamName?' ('+esc(r.teamName)+')':'')+' · <a class="phone" href="tel:'+esc(r.phone)+'">'+esc(r.phone)+'</a></p>'+
      (r.note?'<p class="line">หมายเหตุ: '+esc(r.note)+'</p>':'');

    if (isCancelled){
      html+='<div class="done">'+esc(r.status)+' โดย '+esc(r.staffNote)+'</div>';
      card.innerHTML=html;
    } else {
      // ยืนยันแล้ว: โชว์ว่าใครยืนยัน แล้วยังเปิดช่องแก้ไว้ให้กดยกเลิกได้
      if (isConfirmed){
        html+='<div class="done">ยืนยันแล้ว โดย '+esc(r.staffNote)+'</div>';
      }
      html+=
        '<div class="edit">'+
          '<label>'+(isConfirmed?'แก้ไข / ยกเลิกการจอง':'เปลี่ยนสถานะ')+'</label>'+
          '<select class="fStatus"><option value="">— เลือกการดำเนินการ —</option><option>รอยืนยัน</option><option>ยืนยันแล้ว</option><option>ยกเลิก</option></select>'+
          '<label>ชื่อเจ้าหน้าที่</label>'+
          '<input class="fStaff" type="text" placeholder="ระบุชื่อผู้รับเรื่อง">'+
          '<label>บันทึกเพิ่มเติม (ถ้ามี)</label>'+
          '<input class="fNote" type="text" placeholder="'+(isConfirmed?'เช่น ลูกค้าโทรมายกเลิก':'เช่น ได้รับมัดจำแล้ว')+'">'+
          '<button class="btn sm fSave">บันทึก</button>'+
        '</div>';
      card.innerHTML=html;
      var saveBtn=card.querySelector('.fSave');
      saveBtn.addEventListener('click', function(){
        var status=card.querySelector('.fStatus').value;
        var staff=card.querySelector('.fStaff').value.trim();
        var note=card.querySelector('.fNote').value.trim();
        if (!status){ alert('กรุณาเลือกการดำเนินการก่อนบันทึก'); return; }
        if (!staff){ alert('กรุณาระบุชื่อเจ้าหน้าที่ก่อนบันทึก'); return; }
        if (status==='ยกเลิก' && !confirm('ยืนยันการยกเลิกการจอง '+r.bookingId+' ?')){ return; }
        saveBtn.disabled=true; saveBtn.textContent='กำลังบันทึก...';
        jsonp(GAS_URL, { action:'update', bookingId:r.bookingId, status:status, staff:staff, note:note, pw:STAFF_PW }, function(res){
          if (res && res.ok){ loadList(); }
          else { saveBtn.disabled=false; saveBtn.textContent='บันทึก'; alert((res&&res.error)?res.error:'บันทึกไม่สำเร็จ'); }
        });
      });
    }
    box.appendChild(card);
  });
}
</script>
</body>
</html>
